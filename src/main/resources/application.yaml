spring:
  application:
    name: book-service

  # Config Server use කිරීම optional ලෙස
  config:
    import: optional:configserver:http://localhost:9000

  datasource:
    url: jdbc:postgresql://localhost:13500/library_system_eca
    username: postgres
    password: psql
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

app:
  storage:
    path: ./storage
